<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DenaroTrack - Expenses</title>
  <meta name="description" content="Expense tracking and management">
  <link rel="stylesheet" href="css/styles.css?v=fix4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
</head>

<body class="has-sidebar">
  <script>
    (function () {
      const isExpanded = localStorage.getItem("sidebarExpanded") !== "false";
      document.body.classList.add(isExpanded ? "sidebar-expanded" : "sidebar-collapsed");
    })();
  </script>
  <div class="app-layout">
    <!-- Sidebar container for dynamic insertion -->
    <div id="sidebar-container"></div>

    <!-- All visible page content must be wrapped inside BOTH wrappers -->
    <main class="main-content">
      <section class="container page-container">

        <header class="page-header">
          <!-- Top area with greeting and buttons -->
          <div class="top-area">
            <div>
              <h1 class="greeting">💸 Transactions</h1>
              <p class="text-body text-secondary mt-2">Track and manage your income and expenses</p>
            </div>
            <div class="button-group flex items-center gap-2" style="position: relative;">
              <button id="calendar-btn" class="btn btn-secondary btn-icon" title="Filter by date" style="font-size: 20px; padding: 8px 12px; height: 42px;">📅</button>
              <div id="calendar-popup" class="card" style="display: none; position: fixed; z-index: 1000; width: min(320px, calc(100vw - 32px)); padding: var(--space-4); background: var(--bg-primary); border: 1.5px solid var(--border-primary); box-shadow: var(--shadow-lg); border-radius: var(--radius-2xl);">
                <div class="calendar-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-3);">
                  <button id="cal-prev-month" class="btn btn-ghost btn-icon" style="padding: 4px; font-size: 14px; min-width: auto; height: auto;" type="button">←</button>
                  <h3 id="calendar-title" class="text-h3" style="margin: 0; font-size: 16px; color: var(--text-primary);"></h3>
                  <button id="cal-next-month" class="btn btn-ghost btn-icon" style="padding: 4px; font-size: 14px; min-width: auto; height: auto;" type="button">→</button>
                </div>
                <div id="calendar-popup-body"></div>
              </div>
            </div>
          </div>
        </header>

        <section class="page-body">



          <!-- Period Display -->
          <div class="period-selector card card-span-12">
            <div class="flex items-center gap-3">
              <button id="prev-month-btn" class="btn btn-ghost btn-icon">
                ←
              </button>
              <h2 id="current-period" class="text-h2">January 2023</h2>
              <button id="next-month-btn" class="btn btn-ghost btn-icon">
                →
              </button>
            </div>
            <button id="today-btn" class="btn btn-secondary">
              Today
            </button>
          </div>



          <!-- Filters Section -->
          <div class="card card-span-12">
            <h3 class="text-h3 mb-4">🔍 Search & Filter</h3>
            <div class="filter-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-4);">
              <div class="input-group">
                <label for="filter-search" class="input-label">Search</label>
                <input type="text" id="filter-search" class="input-field" placeholder="Search by name...">
              </div>

              <div class="input-group">
                <label for="filter-type" class="input-label">Type</label>
                <select id="filter-type" class="input-field">
                  <option value="all">All Types</option>
                  <option value="expense">Expense</option>
                  <option value="income">Income</option>
                </select>
              </div>

              <div class="input-group flex items-end">
                <button id="toggle-advanced-btn" class="btn btn-secondary w-full" type="button" style="height: 42px;">
                  Advanced Filters ▾
                </button>
              </div>
            </div>

            <!-- Date Filter Pill Banner -->
            <div id="active-date-filter-banner" style="display: none; align-items: center; gap: 8px; justify-content: space-between; padding: 6px 12px; margin-top: 12px; margin-bottom: 4px; background: var(--accent-light); border: 1px solid var(--accent-primary); border-radius: var(--radius-xl); width: fit-content;">
              <span style="display: flex; align-items: center; gap: 8px; color: var(--text-primary); font-weight: 500; font-size: 14px;">
                📅 <span id="active-date-filter-text">18 Jun 2026</span>
                <button id="clear-date-filter-btn" style="background: none; border: none; font-size: 14px; cursor: pointer; color: var(--text-secondary); font-weight: bold; margin-left: 8px; display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%;">✕</button>
              </span>
            </div>

            <!-- Collapsible Advanced Filters Section -->
            <div id="advanced-filters-section" style="max-height: 0; opacity: 0; overflow: hidden; border-top: 1px dashed var(--border-primary); padding-top: 0; margin-top: 0; transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease, margin 0.3s ease;">
              <div class="filter-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-4);">
                <div class="input-group">
                  <label for="filter-category" class="input-label">Category</label>
                  <select id="filter-category" class="input-field">
                    <option value="all">All Categories</option>
                    <!-- Other options will be populated dynamically -->
                  </select>
                </div>

                <div class="input-group">
                  <label for="filter-min-amount" class="input-label">Min Amount</label>
                  <input type="number" id="filter-min-amount" class="input-field" placeholder="0">
                </div>

                <div class="input-group">
                  <label for="filter-max-amount" class="input-label">Max Amount</label>
                  <input type="number" id="filter-max-amount" class="input-field" placeholder="Any">
                </div>

                <div class="input-group flex items-end">
                  <button id="reset-filters-btn" class="btn btn-secondary w-full" style="height: 42px;">
                    Reset Filters
                  </button>
                </div>
              </div>
            </div>
            <p class="text-body text-secondary mt-4">Filter or reset transactions above</p>
          </div>

          <!-- Add Transaction Buttons -->
          <div class="card card-span-12">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
              <h2 class="text-h2">Transactions</h2>
              <div class="flex gap-2 flex-wrap transaction-actions">
                <button id="add-expense-btn" class="btn btn-primary">
                  Add Expense
                </button>
                <button id="add-income-btn" class="btn btn-success">
                  Add Income
                </button>
                <button id="clear-month-btn" class="btn btn-danger">
                  Clear Month
                </button>
              </div>
            </div>

            <div id="expense-list" class="expense-list">
              <div class="empty-state">
                <div class="empty-state-icon">💸</div>
                <h3 class="text-h3 mb-2">No expenses yet</h3>
                <p class="text-body text-secondary">Add your first expense to get started</p>
              </div>
            </div>
          </div>
        </section> <!-- page-body -->
      </section> <!-- page-container -->
    </main>
  </div> <!-- app-layout -->

    <!-- Script Order (ES Modules Entry) -->
    <script type="module" src="js/bootstrap.js?v=fix4"></script>
    <script>
      // Expenses page initialization now handled by bootstrap.js
    </script>

</body>

</html>
